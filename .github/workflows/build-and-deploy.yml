name: Build and Deploy

on:
  push:
    branches:
      - main
  schedule:
    # 10分ごとに実行
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/310950921363/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-calendar@naari3-calendar.iam.gserviceaccount.com'

      - name: Build project
        run: pnpm build
        env:
          GOOGLE_CALENDAR_IDS: ${{ secrets.GOOGLE_CALENDAR_IDS }}
          PUBLIC_GOOGLE_CALENDAR_IDS: ${{ secrets.PUBLIC_GOOGLE_CALENDAR_IDS }}

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment

      - name: Keep repository alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          LAST_COMMIT=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DAYS=$(( (NOW - LAST_COMMIT) / 86400 ))
          if [ "$DAYS" -ge 50 ]; then
            git commit --allow-empty -m "chore: keepalive [skip ci]"
            git push
          else
            echo "Last commit was $DAYS days ago, no keepalive needed"
          fi
        if: always()